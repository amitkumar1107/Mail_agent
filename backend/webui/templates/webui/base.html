<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Mail Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --card: rgba(255,255,255,0.1); --ink: #ffffff; --muted: #b0b0b0; --brand: #6C63FF; --brand2: #00D4FF; --ok: #10b981; --err: #ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); color: var(--ink); min-height: 100vh; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 12px; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    .nav a { text-decoration: none; color: var(--brand); padding: 8px 10px; border-radius: 8px; font-weight: 600; transition: all 0.3s ease; }
    .nav a:hover { background: rgba(108,99,255,0.2); transform: translateY(-2px); }
    .pill { background: rgba(108,99,255,0.2); color: var(--brand); border-radius: 999px; padding: 6px 10px; font-size: 12px; }
    .grid { display: grid; gap: 16px; }
    .g2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card { background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 14px; padding: 20px; margin-top: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    h1 { margin: 6px 0 14px; font-size: 28px; font-weight: 700; }
    h2 { margin: 6px 0 10px; font-size: 20px; font-weight: 600; }
    input, textarea, select, button { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; font: inherit; background: rgba(255,255,255,0.05); color: var(--ink); transition: all 0.3s ease; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(108,99,255,0.3); }
    textarea { min-height: 110px; resize: vertical; }
    label { display: block; margin: 8px 0 6px; font-weight: 600; color: var(--ink); }
    button { background: linear-gradient(135deg, var(--brand), var(--brand2)); color: #fff; border: none; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    button:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(108,99,255,0.4); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row > * { flex: 1 1 160px; }
    .status { margin-top: 8px; font-size: 14px; color: var(--muted); white-space: pre-wrap; }
    .ok { color:var(--ok); }
    .err { color:var(--err); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { border-bottom:1px solid #e6edf8; padding:8px; text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:700; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900 min-h-screen text-white font-inter">
  <div class="flex min-h-screen">
    <aside class="w-64 bg-white/10 backdrop-blur-md border-r border-white/10 p-4 hidden md:block">
      <h2 class="text-xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">AI Mail Assistant</h2>
      <nav class="space-y-2">
        <a href="/login/" class="block p-2 rounded hover:bg-white/20 transition-all" data-i18n="login">Login</a>
        <a href="/command/" class="block p-2 rounded hover:bg-white/20 transition-all" data-i18n="command">Command</a>
        <a href="/contacts/" class="block p-2 rounded hover:bg-white/20 transition-all" data-i18n="contacts">Contacts</a>
        <a href="/reminders/" class="block p-2 rounded hover:bg-white/20 transition-all" data-i18n="reminders">Reminders</a>
        <a href="/dashboard/" class="block p-2 rounded hover:bg-white/20 transition-all" data-i18n="dashboard">Dashboard</a>
        <a href="/history/" class="block p-2 rounded hover:bg-white/20 transition-all" data-i18n="history">History</a>
      </nav>
    </aside>
    <main class="flex-1 flex flex-col">
      <header class="bg-white/10 backdrop-blur-md border-b border-white/10 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">AI Mail Assistant</h1>
        <div class="flex items-center gap-4">
          <span class="pill" id="auth-state">Not Logged In</span>
          <select id="lang-select" class="bg-white/5 border border-white/20 rounded px-2 py-1 text-white">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="hinglish">Hinglish</option>
          </select>
        </div>
      </header>
      <div class="flex-1 p-6">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    const LANG = {
      en: { login:'Login', command:'Command', contacts:'Contacts', reminders:'Reminders', dashboard:'Dashboard', history:'History' },
      hi: { login:'Login', command:'Command', contacts:'Sampark', reminders:'Reminder', dashboard:'Dashboard', history:'Itihaas' },
      hinglish: { login:'Login', command:'Command', contacts:'Contacts', reminders:'Reminders', dashboard:'Dashboard', history:'History' }
    };

    function getToken(){ return localStorage.getItem('access_token') || ''; }
    function setToken(t){ localStorage.setItem('access_token', t || ''); updateAuthState(); }
    function setRefreshToken(t){ localStorage.setItem('refresh_token', t || ''); }
    function authHeaders(isJson=true){
      const h = {};
      const token = getToken();
      if (token) h['Authorization'] = `Bearer ${token}`;
      if (isJson) h['Content-Type'] = 'application/json';
      return h;
    }
    function updateAuthState(){
      const el = document.getElementById('auth-state');
      if (!el) return;
      el.textContent = getToken() ? 'Logged In' : 'Not Logged In';
    }
    function setLanguage(lang){
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (LANG[lang] && LANG[lang][k]) el.textContent = LANG[lang][k];
      });
    }
    (function init(){
      const select = document.getElementById('lang-select');
      const lang = localStorage.getItem('lang') || 'en';
      if (select) { select.value = lang; select.addEventListener('change', e => setLanguage(e.target.value)); }
      setLanguage(lang);
      updateAuthState();
    })();
  </script>
  {% block page_js %}{% endblock %}
</body>
</html>
