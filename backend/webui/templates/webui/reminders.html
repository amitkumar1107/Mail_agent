{% extends "webui/base.html" %}
{% block content %}
<div class="card">
  <h1 data-i18n="reminders">Reminders</h1>
  <div class="grid g2">
    <div>
      <label>Title</label><input id="r-title" />
      <label>Message</label><textarea id="r-msg"></textarea>
      <label>Contact</label><select id="r-contact"><option value="">No Contact</option></select>
      <label>Reminder Type</label><select id="r-type"><option value="custom">custom</option><option value="birthday">birthday</option><option value="anniversary">anniversary</option></select>
      <label>Scheduled For</label><input id="r-time" type="datetime-local" />
      <label><input id="r-auto" type="checkbox" style="width:auto;" /> Auto Send Email</label>
      <button id="r-save">Create Reminder</button>
      <div id="r-status" class="status"></div>
    </div>
    <div>
      <div class="row"><button id="r-load">Refresh</button><button id="r-run">Run Due Tasks</button></div>
      <div style="overflow:auto; max-height:420px; margin-top:8px;">
        <table><thead><tr><th>Title</th><th>Type</th><th>Schedule</th><th>Status</th></tr></thead><tbody id="r-list"></tbody></table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block page_js %}
<script>
  const rs = document.getElementById('r-status');
  async function loadContacts(){
    const resp = await fetch('/api/contacts/', {headers: authHeaders(false)});
    const data = await resp.json();
    const list = document.getElementById('r-contact');
    list.innerHTML = '<option value="">No Contact</option>' + (data.results||data||[]).map(c=>`<option value="${c.id}">${c.full_name} (${c.email||'no-email'})</option>`).join('');
  }
  async function loadReminders(){
    const resp = await fetch('/api/reminders/', {headers: authHeaders(false)});
    const data = await resp.json();
    document.getElementById('r-list').innerHTML = (data.results||data||[]).map(r=>`<tr><td>${r.title}</td><td>${r.reminder_type}</td><td>${r.scheduled_for}</td><td>${r.status}</td></tr>`).join('');
  }
  document.getElementById('r-save').onclick = async () => {
    const payload = {
      title: document.getElementById('r-title').value.trim(),
      message: document.getElementById('r-msg').value,
      contact: document.getElementById('r-contact').value || null,
      reminder_type: document.getElementById('r-type').value,
      scheduled_for: document.getElementById('r-time').value,
      auto_send_email: document.getElementById('r-auto').checked
    };
    const resp = await fetch('/api/reminders/', {method:'POST', headers: authHeaders(), body: JSON.stringify(payload)});
    const data = await resp.json();
    rs.textContent = resp.ok ? 'Reminder created.' : (data.detail || JSON.stringify(data));
    rs.className = resp.ok ? 'status ok' : 'status err';
    if (resp.ok) loadReminders();
  };
  document.getElementById('r-load').onclick = loadReminders;
  document.getElementById('r-run').onclick = async () => {
    const resp = await fetch('/api/reminders/run-due/', {method:'POST', headers: authHeaders(false)});
    const data = await resp.json();
    rs.textContent = resp.ok ? data.message : JSON.stringify(data);
    rs.className = resp.ok ? 'status ok' : 'status err';
  };
  loadContacts(); loadReminders();
</script>
{% endblock %}
