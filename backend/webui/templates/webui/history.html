{% extends "webui/base.html" %}
{% block content %}
<div class="card">
  <h1 data-i18n="history">History</h1>
  <div class="row">
    <input id="h-recipient" placeholder="Recipient filter" />
    <input id="h-intent" placeholder="Intent filter" />
    <button id="h-load">Load History</button>
    <button id="h-resend">Resend Last Mail</button>
  </div>
  <div id="h-status" class="status"></div>
</div>
<div class="grid g2">
  <div class="card">
    <h2>Sent Emails</h2>
    <div style="overflow:auto; max-height:420px;"><table><thead><tr><th>To</th><th>Subject</th><th>Result</th><th>At</th></tr></thead><tbody id="h-sent"></tbody></table></div>
  </div>
  <div class="card">
    <h2>Commands</h2>
    <div style="overflow:auto; max-height:420px;"><table><thead><tr><th>Command</th><th>Intent</th><th>Tone</th><th>At</th></tr></thead><tbody id="h-cmd"></tbody></table></div>
  </div>
</div>
{% endblock %}
{% block page_js %}
<script>
  const hs = document.getElementById('h-status');
  async function loadHist(){
    const recipient = encodeURIComponent(document.getElementById('h-recipient').value.trim());
    const intent = encodeURIComponent(document.getElementById('h-intent').value.trim());
    const sentResp = await fetch('/api/mail/history/sent/?recipient='+recipient, {headers: authHeaders(false)});
    const sentData = await sentResp.json();
    document.getElementById('h-sent').innerHTML = (sentData.results||[]).map(x=>`<tr><td>${x.recipient_email||''}</td><td>${x.subject||''}</td><td>${x.result||''}</td><td>${x.sent_at||''}</td></tr>`).join('');

    const cmdResp = await fetch('/api/mail/history/commands/?intent='+intent, {headers: authHeaders(false)});
    const cmdData = await cmdResp.json();
    document.getElementById('h-cmd').innerHTML = (cmdData.results||[]).map(x=>`<tr><td>${x.command_text||''}</td><td>${x.parsed_intent||''}</td><td>${x.parsed_tone||''}</td><td>${x.created_at||''}</td></tr>`).join('');
  }
  document.getElementById('h-load').onclick = loadHist;
  document.getElementById('h-resend').onclick = async () => {
    const resp = await fetch('/api/mail/actions/resend-last/', {method:'POST', headers: authHeaders(false)});
    const data = await resp.json();
    hs.textContent = resp.ok ? 'Resent successfully.' : (data.detail || JSON.stringify(data));
    hs.className = resp.ok ? 'status ok' : 'status err';
    if (resp.ok) loadHist();
  };
  loadHist();
</script>
{% endblock %}
