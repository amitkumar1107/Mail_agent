{% extends "webui/base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-full">
  <div class="card max-w-md w-full">
    <h1 class="text-center text-3xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">Create Account</h1>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium">Email</label>
        <input id="signup-email" type="email" class="mt-1 block w-full" placeholder="Enter your email" />
      </div>
      <div>
        <label class="block text-sm font-medium">Username</label>
        <input id="signup-username" class="mt-1 block w-full" placeholder="Choose a username" />
      </div>
      <div>
        <label class="block text-sm font-medium">Password</label>
        <input id="signup-password" type="password" class="mt-1 block w-full" placeholder="Create a password" />
      </div>
      <button id="signup-btn" type="button" class="w-full bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 text-white font-bold py-2 px-4 rounded transition-all">Create Account</button>
      <div id="signup-status" class="status text-center"></div>
    </form>
    <p class="text-center mt-4">Already have an account? <a href="/login/" class="text-blue-400 hover:text-blue-300">Login here</a></p>
  </div>
</div>
{% endblock %}
{% block page_js %}
<script>
  const signupStatus = document.getElementById('signup-status');

  document.getElementById('signup-btn').onclick = async (e) => {
    e.preventDefault();
    signupStatus.textContent = 'Creating account...';
    signupStatus.className = 'status text-center';

    const email = document.getElementById('signup-email').value.trim().toLowerCase();
    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value;

    const resp = await fetch('/api/auth/signup/', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, email, password })
    });

    const data = await resp.json();
    if (!resp.ok) {
      signupStatus.textContent = data.detail || JSON.stringify(data);
      signupStatus.className = 'status err text-center';
      return;
    }

    signupStatus.textContent = 'Account created. OTP sent. Redirecting to OTP verification...';
    signupStatus.className = 'status ok text-center';

    setTimeout(() => {
      window.location.href = `/login/?email=${encodeURIComponent(email)}`;
    }, 900);
  };
</script>
{% endblock %}
