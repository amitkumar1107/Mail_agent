services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.free
    environment:
      DB_ENGINE: sqlite
      SQLITE_PATH: /data/db.sqlite3
      CACHE_BACKEND: locmem
      CELERY_TASK_ALWAYS_EAGER: "true"
      MAIL_SEND_ASYNC: "false"
      RUN_MIGRATIONS: "true"
      COLLECT_STATIC: "true"
    user: "0:0"
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  staticfiles:
  sqlite_data:
